name: alist_app
description: A beautiful Alist client for Android

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.4.0
  
  # Video Player
  media_kit: ^1.1.10
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4
  
  # Image
  cached_network_image: ^3.3.1
  photo_view: ^0.14.0
  
  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Files
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  
  # UI
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  iconsax: ^0.0.8
  google_fonts: ^6.1.0
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  # connectivity_plus ඉවත් කළා ❌

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
